<app-header-home variant="home" />

<div class="home-layout">
  <!-- Sidebar -->
  <aside class="sidebar">
    <nav class="sidebar-nav">
      <a href="#" class="sidebar-item active">
        <i class="bi bi-house-door"></i>
        <span>Home</span>
      </a>
      <a routerLink="/favorites" class="sidebar-item">
        <i class="bi bi-star"></i>
        <span>Favorites</span>
      </a>
    </nav>

    <div class="sidebar-bottom">
      <a href="settings" class="sidebar-item">
        <i class="bi bi-gear"></i>
        <span>Settings</span>
      </a>
    </div>
  </aside>

  <!-- Main Content -->
  <main class="main-content">
    <div class="content-header">
      <h5 class="fw-bold mb-0">Recent boards</h5>
    </div>

    <!-- Boards Grid -->
    <div class="boards-grid">
      <!-- New Board Card -->
      <div class="board-card board-card-new" routerLink="/whiteboard">
        <div class="new-board-inner">
          <i class="bi bi-plus-lg fs-4 text-primary"></i>
          <span class="text-primary fw-semibold mt-1">New board</span>
        </div>
      </div>

      <!-- Board Card -->
      <div class="board-card" *ngFor="let board of boards">
        <div class="board-thumbnail">
          <div class="board-thumbnail-inner"></div>
        </div>
        <div class="board-meta">
          <div class="d-flex align-items-center justify-content-between">
            <span class="board-name">{{ board.name }}</span>
            <button class="btn btn-link btn-sm text-muted p-0">
              <i class="bi bi-three-dots"></i>
            </button>
          </div>
          <div class="board-info">
            <span class="badge-board" [ngClass]="board.shared ? 'badge-shared' : 'badge-private'">
              {{ board.shared ? 'Shared' : 'Only you' }}
            </span>
          </div>
        </div>
      </div>
    </div>
  </main>

  <!-- New Board Button -->
  <button class="btn-new-board" routerLink="/whiteboard">
    <i class="bi bi-plus-lg me-2"></i> New board
  </button>
</div>
