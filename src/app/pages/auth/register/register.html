<div class="vh-100 d-flex justify-content-center align-items-center bg-light">
  <div class="card shadow-sm p-4 rounded-3" style="width: 340px">
    <h4 class="text-center mb-4">Create Account</h4>

    <form #form="ngForm" (ngSubmit)="register(form)">
      <!-- Name -->
      <div class="mb-3">
        <label class="form-label">Name</label>
        <input type="text" class="form-control" [(ngModel)]="name" name="name" required />
      </div>

      <!-- Email -->
      <div class="mb-3">
        <label class="form-label">Email</label>
        <input type="email" class="form-control" [(ngModel)]="email" name="email" required />
      </div>

      <!-- Password -->
      <div class="mb-3">
        <label class="form-label">Password</label>
        <input
          type="password"
          class="form-control"
          [(ngModel)]="password"
          name="password"
          required
        />
      </div>

      <!-- Register Button -->
      <button type="submit" class="btn btn-primary w-100 mb-2" [disabled]="form.invalid">
        Register
      </button>

      <hr />

      <!-- Back to Sign In -->
      <button type="button" class="btn btn-outline-dark w-100" routerLink="/login">
        Back to Log In
      </button>
    </form>
  </div>
</div>
