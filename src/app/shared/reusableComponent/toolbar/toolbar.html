<div class="toolbar rounded-3  bg-white  d-flex shadow-sm  flex-column align-items-center py-3 gap-2">
  <button class="btn btn-outline-dark tool-btn" data-tool="select">🖱️</button>
  <button class="btn btn-outline-dark tool-btn active" data-tool="pen">✏️</button>
  <button class="btn btn-outline-dark tool-btn" data-tool="rect">▭</button>
  <button class="btn btn-outline-dark tool-btn" data-tool="circle">⚪</button>
  <button class="btn btn-outline-dark tool-btn" data-tool="text">🔤</button>
  <button class="btn btn-outline-dark tool-btn" data-tool="note">🗒️</button>

  <hr class="text-white w-75" />

  <button class="btn btn-warning" id="undo">↩️</button>
  <button class="btn btn-danger" id="clear">🧹</button>
</div>
