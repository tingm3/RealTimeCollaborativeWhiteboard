<div class="toolbar rounded-3 d-flex flex-column align-items-center py-3 gap-2 bg-light border">
  <!-- Tool buttons -->
  <button
    *ngFor="let t of tools"
    class="btn"
    [ngClass]="currentTool === t.name ? 'btn-primary active' : 'btn-outline-dark'"
    (click)="selectTool(t.name)"
  >
    <i class="bi {{ t.icon }}"></i>
  </button>

  <hr class="w-75 border-dark" />

  <!-- Action buttons -->
  <button class="btn btn-warning" (click)="triggerUndo()">
    <i class="bi-arrow-counterclockwise"></i>
  </button>
  <button class="btn btn-danger" (click)="triggerTrash()">
    <i class="bi-trash"></i>
  </button>
  <button class="btn btn-success" (click)="triggerSave()">
    <i class="bi-save"></i>
  </button>
</div>
