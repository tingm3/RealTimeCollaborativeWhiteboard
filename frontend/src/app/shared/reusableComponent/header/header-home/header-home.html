<!-- Full navbar for landing and home -->
<ng-container *ngIf="variant !== 'auth'">
  <nav class="navbar navbar-expand-lg navbar-light bg-white border-bottom px-3 fixed-top shadow-sm navbar-home">
    <div class="container-fluid">

      <a [routerLink]="variant === 'landing' ? '/' : '/home'" class="d-flex align-items-center text-decoration-none">
        <i class="bi bi-grid-1x2-fill text-primary me-2"></i>
        <span class="fw-bold text-dark">Project Whiteboard</span>
      </a>

      <div class="ms-auto d-flex align-items-center flex-nowrap">
        <ng-container *ngIf="variant === 'landing'">
          <a routerLink="/login" class="btn-nav-ghost me-2">Log in</a>
          <a routerLink="/register" class="btn-nav-primary">Get started free</a>
        </ng-container>

        <!-- Home Header -->
        <ng-container *ngIf="variant === 'home'">
          <div class="input-group input-group-sm me-3" style="width: 200px;">
            <span class="input-group-text bg-light border-end-0">
              <i class="bi bi-search text-muted"></i>
            </span>
            <input type="text" class="form-control bg-light border-start-0" placeholder="Search boards..." />
          </div>
          <div class="auth-divider"></div>

          <!-- Avatar + Dropdown -->
          <div class="position-relative">
            <div class="avatar-pill bg-primary text-white" style="cursor: pointer;" (click)="toggleDropdown()">
              {{ initials }}
            </div>
            <div *ngIf="isDropdownOpen" class="position-absolute end-0 mt-2 bg-white border rounded-3 shadow-sm"
              style="min-width: 160px; z-index: 1000;">
              <div class="px-3 py-2 border-bottom text-muted small">{{ username }}</div>
              <button class="btn btn-sm w-100 text-start px-3 py-2 text-danger" (click)="logout()">
                <i class="bi bi-box-arrow-right me-2"></i>Log out
              </button>
            </div>
          </div>

        </ng-container>
      </div>

    </div>
  </nav>
</ng-container>

<!-- Auth Header-->
<ng-container *ngIf="variant === 'auth'">
  <nav class="navbar px-3 fixed-top navbar-home" style="background: transparent;">
    <div class="container-fluid">
      <a routerLink="/" class="d-flex align-items-center text-decoration-none">
        <i class="bi bi-grid-1x2-fill text-primary me-2"></i>
        <span class="fw-bold text-dark">Project Whiteboard</span>
      </a>
    </div>
  </nav>
</ng-container>
