<nav class="navbar navbar-expand-lg navbar-light bg-white border-bottom px-2 fixed-top shadow-sm navbar-whiteboard">
  <div class="container-fluid">

    <div class="d-flex align-items-center">
      <a routerLink="/home" class="btn-back me-1" title="Back to Home">
        <i class="bi bi-arrow-left-short fs-4"></i>
      </a>
      <i class="bi bi-grid-1x2-fill text-primary ms-2"></i>
      <span class="board-title ms-2" *ngIf="!isEditing" (click)="startEditing()">
        {{ boardTitle }}
      </span>
      <input *ngIf="isEditing" type="text" class="board-title-input ms-2" [(ngModel)]="boardTitle"
        (blur)="onTitleSave()" (keyup.enter)="onTitleSave()" #titleInput />
    </div>

    <div class="ms-auto d-flex align-items-center flex-nowrap">



      <button class="btn btn-sm btn-outline-primary btn-pill fw-bold me-2" (click)="onShare.emit()">
        Share
      </button>

      <div class="auth-divider"></div>

      <!-- Avatar + Dropdown -->
      <div class="position-relative">
        <div class="avatar-pill bg-primary text-white" style="cursor: pointer;" (click)="toggleDropdown()">
          {{ initials }}
        </div>
        <div *ngIf="isDropdownOpen" class="position-absolute end-0 mt-2 bg-white border rounded-3 shadow-sm"
          style="min-width: 160px; z-index: 1000;">
          <div class="px-3 py-2 border-bottom text-muted small">{{ currentUsername }}</div>
          <button class="btn btn-sm w-100 text-start px-3 py-2 text-danger" (click)="logout()">
            <i class="bi bi-box-arrow-right me-2"></i>Log out
          </button>
        </div>
      </div>

    </div>
  </div>
</nav>
