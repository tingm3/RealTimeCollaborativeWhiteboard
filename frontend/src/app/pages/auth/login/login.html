<app-header-home variant="auth" />

<div class="vh-100 d-flex justify-content-center align-items-center bg-light" style="padding-top: 56px;">
  <div class="card p-5 rounded-4" style="width: 480px;">
    <h4 class="text-center mb-4">Log In</h4>

    <form #form="ngForm" (ngSubmit)="signIn(form)">
      <!-- Username -->
      <!-- Username -->
      <div class="mb-3">
        <label class="form-label">Username</label>
        <input type="text" class="form-control" [(ngModel)]="username" name="username" placeholder="Enter username"
          required />
        <label class="form-label">Username</label>
        <input type="text" class="form-control" [(ngModel)]="username" name="username" placeholder="Enter username"
          required />
      </div>

      <!-- Password -->
      <div class="mb-3">
        <label class="form-label">Password</label>
        <input type="password" class="form-control" [(ngModel)]="password" name="password" placeholder="Enter password"
          required />
      </div>

      <!-- Error -->
      <div *ngIf="errorMessage" class="alert alert-danger py-2 mb-2">{{ errorMessage }}</div>

      <!-- Log In Button -->
      <button class="btn btn-primary w-100 mb-2 btn-pill" type="submit" [disabled]="form.invalid || isLoading">
        {{ isLoading ? 'Logging in...' : 'Log In' }}
      </button>

      <hr />

      <!-- Error -->
      <div *ngIf="errorMessage" class="alert alert-danger py-2 mb-2">{{ errorMessage }}</div>

      <!-- Extra Actions -->
      <div class="d-flex justify-content-center">
        <button type="button" class="btn btn-outline-primary w-100" routerLink="/register">
          Create Account
        </button>
      </div>
    </form>
  </div>
</div>
