<app-header-home variant="landing" />

<div class="static-page">
  <div class="static-container" style="max-width: 560px;">
    <h1 class="static-title">Contact us</h1>
    <p class="static-text" style="margin-bottom: 2rem;">Have a question or feedback? Fill out the form below and we'll
      get back to you.</p>

    <div class="contact-form">
      <div class="form-group">
        <label class="form-label">Name</label>
        <input type="text" class="form-control" placeholder="Your name" />
      </div>

      <div class="form-group">
        <label class="form-label">Email</label>
        <input type="email" class="form-control" placeholder="you@example.com" />
      </div>

      <div class="form-group">
        <label class="form-label">Message</label>
        <textarea class="form-control" rows="5" placeholder="Your message..."></textarea>
      </div>

      <button class="btn btn-primary btn-pill fw-semibold w-100">
        Send message <i class="bi bi-arrow-right ms-1"></i>
      </button>
    </div>
  </div>
</div>

<app-footer />
