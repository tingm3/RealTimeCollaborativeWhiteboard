<app-header-home variant="home" />

<div class="home-layout">
  <aside class="sidebar">
    <nav class="sidebar-nav">
      <a routerLink="/home" class="sidebar-item">
        <i class="bi bi-house-door"></i>
        <span>Owned by You</span>
      </a>
      <a routerLink="/shared" class="sidebar-item active">
        <i class="bi bi-people"></i>
        <span>Shared with You</span>
      </a>
    </nav>
    <div class="sidebar-bottom">
      <a routerLink="/home/settings" class="sidebar-item">
        <i class="bi bi-gear"></i>
        <span>Settings</span>
      </a>
    </div>
  </aside>

  <main class="main-content">
    <div class="content-header">
      <h5 class="fw-bold mb-0">Shared with You</h5>
    </div>

    <div *ngIf="sharedBoards.length === 0" class="boards-grid">
      <div class="board-card board-card-new" style="flex-direction: column; gap: 8px">
        <i class="bi bi-people fs-3 text-muted"></i>
        <span class="text-muted fw-semibold">Nothing shared yet</span>
      </div>
    </div>

    <div class="boards-grid">
      <div class="board-card" *ngFor="let board of sharedBoards" (click)="openBoard(board.id!)">
        <div class="board-thumbnail">
          <div class="board-thumbnail-inner"></div>
        </div>
        <div class="board-meta">
          <div class="d-flex align-items-center justify-content-between">
            <span class="board-name">{{ board.name || 'Untitled Board' }}</span>
            <button class="btn btn-link btn-sm text-muted p-0">
              <i class="bi bi-three-dots"></i>
            </button>
          </div>
          <div class="board-info">
            <span class="badge-board badge-shared">Shared</span>
          </div>
        </div>
      </div>
    </div>
  </main>
</div>
